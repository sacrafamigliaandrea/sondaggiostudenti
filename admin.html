<!DOCTYPE html><html lang="it"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="author" content="Progetto Andrea Cerioli"><meta name="copyright" content="2026 Tutti i diritti riservati">
<title>TI ASCOLTO! — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--g:#1B6D3F;--gl:#E8F5EE;--gd:#145230;--tl:#1A7F6D;--am:#C28B0A;--co:#B8432E;--pu:#6B4FA0;--sk:#2E7CAF;--bg:#F5F5F0;--cd:#FFF;--tx:#2C2C2C;--mu:#7A7A72;--bd:#E8E8E2;--f:'DM Sans',sans-serif;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--tx);overflow-x:hidden}
.top{background:var(--g);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top h1{font-size:18px;font-weight:700}.top select{padding:6px 10px;border-radius:8px;border:none;font-family:var(--f);font-size:12px}

/* HERO EVIDENCE CARDS */
.heroes{display:flex;gap:14px;padding:20px 24px;max-width:1400px;margin:0 auto}
.hero-card{flex:1;background:var(--cd);border-radius:var(--r);padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid}
.hero-card .n{font-size:36px;font-weight:700;line-height:1}.hero-card .l{font-size:11px;color:var(--mu);margin-top:4px;line-height:1.4}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 24px 40px;max-width:1400px;margin:0 auto}
.card{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--bd)}
.card.full{grid-column:1/-1}
.card h2{font-size:14px;font-weight:700;color:var(--g);margin-bottom:2px}
.card .sub{font-size:10px;color:var(--mu);margin-bottom:14px}
.ev{padding:10px 14px;border-radius:8px;margin-top:12px;font-size:11px;line-height:1.6}
.ev-warn{background:#FEF3D6;color:#7a5a0a;border-left:4px solid var(--am)}
.ev-alert{background:#FDECE8;color:#7a2a1a;border-left:4px solid var(--co)}
.ev-good{background:var(--gl);color:var(--gd);border-left:4px solid var(--g)}
.ev-info{background:#E8F2FA;color:#1a5a8a;border-left:4px solid var(--sk)}
canvas{max-height:300px!important}

/* HEATMAP */
.hm{display:grid;gap:2px;margin-top:8px}.hm-row{display:flex;gap:2px;align-items:center}
.hm-label{width:80px;font-size:9px;font-weight:500;text-align:right;padding-right:6px;flex-shrink:0}
.hm-cell{flex:1;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;min-width:0}
.hm-header{display:flex;gap:2px;padding-left:82px;margin-bottom:2px}.hm-htxt{flex:1;font-size:8px;color:var(--mu);text-align:center}

/* DIVERGENT BARS */
.div-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;font-size:10px}
.div-label{width:100px;text-align:right;flex-shrink:0;font-weight:500}
.div-bar{flex:1;height:22px;background:var(--bd);border-radius:4px;position:relative;overflow:hidden}
.div-left{position:absolute;right:50%;height:100%;border-radius:4px 0 0 4px}
.div-right{position:absolute;left:50%;height:100%;border-radius:0 4px 4px 0}
.div-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--mu);opacity:.3}
.div-val{width:28px;font-size:9px;font-weight:600;text-align:center}

/* GAUGES */
.gauges{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.gauge{width:100px;text-align:center}
.gauge svg{width:90px;height:50px}
.gauge .gl{font-size:9px;color:var(--mu);margin-top:2px}

/* LOLLIPOP */
.lol-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.lol-label{width:140px;font-size:10px;text-align:right;flex-shrink:0}
.lol-track{flex:1;height:2px;background:var(--bd);position:relative;border-radius:1px}
.lol-dot{width:14px;height:14px;border-radius:50%;position:absolute;top:-6px;transition:left .3s}
.lol-line{position:absolute;left:0;top:0;height:2px;border-radius:1px}
.lol-thresh{position:absolute;top:-10px;width:1px;height:22px;background:var(--mu);opacity:.3}
.lol-val{width:30px;font-size:10px;font-weight:600}

/* LABELED DISTRIBUTION */
.ld{margin-bottom:16px;padding:12px 14px;background:var(--bg);border-radius:8px}
.ld-q{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--tx)}
.ld-row{display:grid;grid-template-columns:220px 1fr 54px;align-items:center;gap:12px;margin-bottom:7px}
.ld-track{height:12px;background:#eee;border-radius:6px;overflow:hidden;position:relative}
.ld-fill{height:100%;border-radius:6px;transition:width .4s ease-out;min-width:2px}
.ld-label{font-size:11px;line-height:1.35;text-align:right;font-weight:500}
.ld-pct{font-size:12px;font-weight:700;text-align:left;font-variant-numeric:tabular-nums}

.load{text-align:center;padding:60px;font-size:14px;color:var(--mu)}
</style></head><body>

<div id="gate" style="height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
<div style="background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:360px;width:100%">
<h1 style="font-size:24px;color:var(--g);margin-bottom:4px">TI ASCOLTO!</h1>
<p style="font-size:12px;color:var(--mu);margin-bottom:20px">Area riservata — Dashboard docenti</p>
<input type="password" id="pwd" onkeydown="if(event.key==='Enter')tryPwd()" placeholder="Password" style="width:100%;padding:12px;border:2px solid var(--bd);border-radius:10px;font-family:var(--f);font-size:16px;text-align:center;margin-bottom:10px">
<button id="btnLogin" onclick="tryPwd()" style="width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-family:var(--f);font-size:15px;font-weight:600;cursor:pointer">Accedi</button>
<p id="pwdErr" style="font-size:11px;color:var(--co);margin-top:8px;display:none">Password errata</p>
</div></div>

<div id="dash" style="display:none">
<div class="top"><h1>TI ASCOLTO! — Dashboard docenti</h1>
<div style="display:flex;gap:8px;align-items:center">
<span id="statusBadge" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600"></span><div id="sessionCodeBox" style="display:none;padding:6px 14px;background:var(--pul);border:2px solid var(--pu);border-radius:8px;align-items:center;gap:10px"><div style="display:flex;flex-direction:column;align-items:flex-start"><span style="font-size:9px;font-weight:700;color:var(--pu);letter-spacing:1px;text-transform:uppercase">Codice sessione</span><span id="sessionCodeValue" style="font-size:20px;font-weight:700;color:var(--pu);letter-spacing:4px;font-family:Menlo,Monaco,monospace;line-height:1">—</span></div><button onclick="copySessionCode()" id="btnCopyCode" style="padding:4px 10px;border-radius:6px;border:1px solid var(--pu);background:#fff;color:var(--pu);cursor:pointer;font-size:11px;font-weight:600;font-family:var(--f)">Copia</button></div>
<select id="filtro"><option value="all">Tutte le classi</option><optgroup label="Per anno"><option value="y1">Tutte le prime</option><option value="y2">Tutte le seconde</option><option value="y3">Tutte le terze</option></optgroup><optgroup label="Per sezione"><option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="2A">2A</option><option value="2B">2B</option><option value="2C">2C</option><option value="3A">3A</option><option value="3B">3B</option><option value="3C">3C</option></optgroup></select>
<button onclick="toggleSurvey()" id="btnToggle" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--am);cursor:pointer">Chiudi sondaggio</button>
<button onclick="genDossier()" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--g);cursor:pointer">Genera Dossier</button>
<button onclick="clearData()" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--co);cursor:pointer">Cancella dati</button>
</div></div>
<div id="heroArea"></div>
<div class="grid" id="content"></div>
</div>

<script>
// Password NON più hardcoded. Viene validata server-side e memorizzata solo in sessione.
let __pwd = '';
let __attempts = 0;
const MAX_ATTEMPTS = 5;
let __lockUntil = 0;
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzPyEMTOH8_1_LvlCrOq1Ecwyn4A4-T_BPgcXN7KgCM8IQS7avIbpj2imStBzF_21t5NQ/exec';
let surveyOpen=true;

async function tryPwd(){
  const err=document.getElementById('pwdErr');
  const now=Date.now();
  if(now<__lockUntil){
    const secs=Math.ceil((__lockUntil-now)/1000);
    err.textContent='Troppi tentativi. Riprova fra '+secs+' secondi.';
    err.style.display='block';
    return;
  }
  const pwd=document.getElementById('pwd').value;
  if(!pwd){err.textContent='Inserisci la password';err.style.display='block';return;}
  const btn=document.getElementById('btnLogin');
  const origText=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Verifica...';}
  try{
    const r=await fetch(SCRIPT_URL+'?action=verify&pwd='+encodeURIComponent(pwd));
    const d=await r.json();
    if(d.ok){
      __pwd=pwd;__attempts=0;
      document.getElementById('gate').style.display='none';
      document.getElementById('dash').style.display='block';
      checkStatus();loadData();
    }else{
      __attempts++;
      if(__attempts>=MAX_ATTEMPTS){
        __lockUntil=Date.now()+60000;
        err.textContent='Troppi tentativi. Bloccato per 60 secondi.';
      }else{
        err.textContent='Password errata ('+__attempts+'/'+MAX_ATTEMPTS+')';
      }
      err.style.display='block';
      document.getElementById('pwd').value='';
    }
  }catch(e){
    err.textContent='Errore di rete. Riprova.';
    err.style.display='block';
  }finally{
    if(btn){btn.disabled=false;btn.textContent=origText;}
  }
}

function checkStatus(){
  fetch(SCRIPT_URL+'?action=status').then(r=>r.json()).then(d=>{
    surveyOpen=d.status!=='closed';
    sessionCode=d.code||'';
    updateStatusUI();
  }).catch(()=>{});
}
let sessionCode = '';
function updateStatusUI(){
  const badge=document.getElementById('statusBadge');
  const btn=document.getElementById('btnToggle');
  const box=document.getElementById('sessionCodeBox');
  const val=document.getElementById('sessionCodeValue');
  if(surveyOpen){
    badge.textContent='APERTO';badge.style.background='var(--gl)';badge.style.color='var(--g)';
    btn.textContent='Chiudi sondaggio';btn.style.color='var(--am)';
    if(sessionCode){
      box.style.display='flex';
      val.textContent=sessionCode;
    } else {
      box.style.display='none';
    }
  } else {
    badge.textContent='CHIUSO';badge.style.background='var(--col)';badge.style.color='var(--co)';
    btn.textContent='Apri sondaggio';btn.style.color='var(--g)';
    box.style.display='none';
  }
}
function copySessionCode(){
  if(!sessionCode)return;
  navigator.clipboard.writeText(sessionCode).then(()=>{
    const btn=document.getElementById('btnCopyCode');
    const old=btn.textContent;btn.textContent='Copiato!';
    setTimeout(()=>{btn.textContent=old;},1200);
  }).catch(()=>{alert('Codice: '+sessionCode);});
}
function toggleSurvey(){
  const action=surveyOpen?'chiudere':'aprire';
  if(!confirm('Vuoi '+action+' il sondaggio?'))return;
  fetch(SCRIPT_URL+'?action=toggle&pwd='+encodeURIComponent(__pwd)).then(r=>r.json()).then(d=>{
    if(d.status){
      surveyOpen=d.status!=='closed';
      sessionCode=d.code||'';
      updateStatusUI();
      if(surveyOpen && sessionCode){
        // Apertura: mostro un dialogo prominente col codice
        alert('SONDAGGIO APERTO\n\nCodice sessione: '+sessionCode+'\n\nScrivi questo codice alla lavagna. Gli studenti dovranno inserirlo nel login.\nQuando chiudi il sondaggio il codice scade automaticamente.');
      } else {
        alert('Sondaggio chiuso. Il codice sessione è stato invalidato.');
      }
    }
    else alert('Errore: '+JSON.stringify(d));
  }).catch(e=>alert('Errore di rete.'));
}
function clearData(){
  if(!confirm('ATTENZIONE: stai per cancellare TUTTI i dati delle risposte. Questa operazione è irreversibile.\n\nSei sicuro?'))return;
  if(!confirm('Conferma definitiva: cancellare tutti i dati?'))return;
  fetch(SCRIPT_URL+'?action=clear&pwd='+encodeURIComponent(__pwd)).then(r=>r.json()).then(d=>{
    if(d.cleared){alert('Cancellati '+d.deletedRows+' record. Ricarico la pagina.');location.reload();}
    else alert('Errore: '+JSON.stringify(d));
  }).catch(e=>alert('Errore di rete.'));
}

// CSV pubblico rimosso per motivi di sicurezza. I dati vengono caricati via Apps Script con password validata server-side.
const SUBS=['Italiano','Inglese','Storia','Geografia','Matematica','Scienze','Tecnologia','Arte e Imm.','Musica','Spagnolo','Ed. Fisica','Religione','Ed. Civica','Comportam.','Informatica'];
const SUB_C=['ITAL','INGL','STOR','GEOG','MATE','SCIE','TECN','ARTE','MUSI','SPAN','EDFI','RELI','EDCI','COMP','INFO'];
const MDIM=['Interesse','Chiarezza','Attivazione'];
const SDIM=['Come imparo','Ritmo','Concentrazione','Capisco e studio','Socialità','Aspettative'];
const SCOL=['#2D8B57','#C28B0A','#B8432E','#6B4FA0','#1A7F6D','#2E7CAF'];
const SNUMS=[5,5,7,12,5,8];

// ============================================================
// SUBJ_DIMS_MAP — codici dimensione per materia
// Materie generiche: 6 dimensioni standard (ARG,REA,DIF,SPG,ATV,CON)
// Italiano/Matematica/Comportamento: componenti specifiche
// ============================================================
const SUBJ_DIMS_MAP={
  _default:['ARG','SPG','ATV'],
  ITAL:['ANT','EPL','GRA','SCR'],
  MATE:['ARI','GEO','REL','DAT'],
  COMP:['REG','LIN','SAN','RES','PAR','AUT','FRE']
};
const SUBJ_SPECIAL={ITAL:true,MATE:true,COMP:true};
// Nomi estesi componenti (per display)
const COMP_NAMES={
  ITAL:{ANT:'Antologia / Lettura',EPL:'Epica e Letteratura',GRA:'Grammatica',SCR:'Scrittura'},
  MATE:{ARI:'Aritmetica e Algebra',GEO:'Geometria',REL:'Relazioni e funzioni',DAT:'Dati e previsioni'},
  COMP:{REG:'Rispetto delle regole',LIN:'Uso del linguaggio',SAN:'Sanzioni ricevute',RES:'Responsabilità e assunzione del compito',PAR:'Partecipazione e lavoro di squadra',AUT:'Autocontrollo',FRE:'Frequenza'}
};
// Etichette opzioni testuali (per ldist) — 3 opzioni ciascuna
const COMP_OPTS={
  ITAL:{
    ANT:['Testi pesanti','Dipende dal testo','Alcune storie mi prendono'],
    EPL:['Troppo lontani da oggi','Qualcosa colpisce','Mi affascinano le origini'],
    GRA:['Regole confuse','Pesanti ma capibili','Interessante smontare la lingua'],
    SCR:['Tracce difficili/noiose','Se la traccia è chiara','Mi piace scrivere']
  },
  MATE:{
    ARI:['Calcoli pieni di trappole','Con metodo ed esercizio','Mi riescono bene'],
    GEO:['Figure e formule difficili','Se visualizzo la figura','Ragiono nello spazio'],
    REL:['Astratti, scollegati','Capisco ma fatico ad applicare','Vedo i collegamenti'],
    DAT:['Argomenti poco chiari','Li uso se servono','Mi incuriosiscono']
  },
  COMP:{
    REG:['Trasgredite più volte','Qualche sgarro','Rispettate e capite'],
    LIN:['Stesso tono con tutti','Adatto, non sempre','Cambio in base al contesto'],
    SAN:['Una o più note','Solo richiami verbali','Nessuna sanzione'],
    RES:['Rimando o solo se spinto','Meglio con guida','Autonomo'],
    PAR:['In disparte nei gruppi','Senza iniziative','Propongo e contribuisco'],
    AUT:['Rispondo d\'impulso','Trattengo a fatica','Respiro e penso'],
    FRE:['Più assenze del solito','Qualche ritardo','Sempre presente']
  }
};
// Helper: lista codici dimensione per una materia (per indice in SUB_C)
function dimsOf(subjIdx){
  const code=SUB_C[subjIdx];
  return SUBJ_DIMS_MAP[code]||SUBJ_DIMS_MAP._default;
}
// Helper: è una materia speciale?
function isSpecial(subjIdx){ return !!SUBJ_SPECIAL[SUB_C[subjIdx]]; }
// Helper: indice di una materia speciale
function idxOf(code){ return SUB_C.indexOf(code); }


let ALL=[];
function loadData(){
  fetch(SCRIPT_URL+'?action=fetchData&pwd='+encodeURIComponent(__pwd))
    .then(r=>r.json())
    .then(d=>{
      if(d.error){
        document.getElementById('content').innerHTML='<div class="load">Errore: '+d.error+'. Ricarica la pagina e rifai il login.</div>';
        return;
      }
      const rows=d.rows||[];
      if(rows.length===0){document.getElementById('content').innerHTML='<div class="load">Nessun dato.</div>';return;}
      ALL=rows;
      document.getElementById('filtro').onchange=()=>render();
      render();
    })
    .catch(()=>{
      document.getElementById('content').innerHTML='<div class="load">Errore di rete.</div>';
    });
}

function D(){const f=document.getElementById('filtro').value;if(f==='all')return ALL;if(f==='y1')return ALL.filter(r=>r.classe&&r.classe.startsWith('1'));if(f==='y2')return ALL.filter(r=>r.classe&&r.classe.startsWith('2'));if(f==='y3')return ALL.filter(r=>r.classe&&r.classe.startsWith('3'));return ALL.filter(r=>r.classe===f);}
function avg(R,k){let s=0,c=0;R.forEach(r=>{const v=+r[k];if(v){s+=v;c++;}});return c?s/c:0;}
function dist(R,k){let d=[0,0,0];R.forEach(r=>{const v=+r[k];if(v>=1&&v<=3)d[v-1]++;});const t=d[0]+d[1]+d[2];return t?d.map(x=>Math.round(x/t*100)):[0,0,0];}
function pct(R,k,v){let c=0,t=0;R.forEach(r=>{const x=+r[k];if(x){t++;if(x===v)c++;}});return t?Math.round(c/t*100):0;}
function ldist(R,key,question,opts,colors){
  const d=dist(R,key);colors=colors||['var(--g)','var(--am)','var(--co)'];
  let h='<div class="ld"><div class="ld-q">'+question+'</div>';
  opts.forEach((o,i)=>{
    h+='<div class="ld-row">'
      +'<div class="ld-label" style="color:'+colors[i]+'">'+o+'</div>'
      +'<div class="ld-track"><div class="ld-fill" style="width:'+d[i]+'%;background:'+colors[i]+'"></div></div>'
      +'<div class="ld-pct" style="color:'+colors[i]+'">'+d[i]+'%</div>'
      +'</div>';
  });
  h+='</div>';return h;
}


// Rende una card per una materia speciale (ITAL/MATE/COMP): distribuzione % per componente
function renderSpecialSubj(R,subjCode,title,subtitle){
  const dims=SUBJ_DIMS_MAP[subjCode]||[];
  const names=COMP_NAMES[subjCode]||{};
  const opts=COMP_OPTS[subjCode]||{};
  let h='<div class="card"><h2>'+title+'</h2><div class="sub">'+subtitle+'</div>';
  dims.forEach(dc=>{
    const key='M_'+subjCode+'_'+dc;
    const name=names[dc]||dc;
    const o=opts[dc]||['opz 1','opz 2','opz 3'];
    h+=ldist(R,key,name,o);
  });
  h+='</div>';
  return h;
}

function render(){
  const R=D(),N=R.length;if(!N){document.getElementById('content').innerHTML='<div class="load">Nessun dato.</div>';document.getElementById('heroArea').innerHTML='';return;}

  // === HERO EVIDENCE CARDS — le 4 domande vere ===
  // 1. Dove mettono la scuola? (ranking medio di "Andare bene a scuola" = R_1)
  let rankSum=0,rankN=0;R.forEach(r=>{const v=+r['R_1'];if(v){rankSum+=v;rankN++;}});
  const rankAvg=rankN?rankSum/rankN:0;const rankPos=rankAvg?rankAvg.toFixed(1):'—';
  const rankCol=rankAvg<=2?'var(--g)':rankAvg<=4?'var(--am)':'var(--co)';

  // 2. Si sentono attivi o passivi? (% passivi media su TUTTE le materie)
  let totPass=0,totPassN=0;
  SUB_C.forEach((sc,si)=>{if(isSpecial(si))return;const p=pct(R,'M_'+sc+'_ATV',1);if(p!==undefined){totPass+=p;totPassN++;}});
  const avgPass=totPassN?Math.round(totPass/totPassN):0;
  const passCol=avgPass>40?'var(--co)':avgPass>20?'var(--am)':'var(--g)';

  // 3. Capiscono le spiegazioni? (% che capisce = opzione 3, media su tutte le materie)
  let totCap=0,totCapN=0;
  SUB_C.forEach((sc,si)=>{if(isSpecial(si))return;const p=pct(R,'M_'+sc+'_SPG',3);if(p!==undefined){totCap+=p;totCapN++;}});
  const avgCap=totCapN?Math.round(totCap/totCapN):0;
  const capCol=avgCap>60?'var(--g)':avgCap>40?'var(--am)':'var(--co)';

  // 4. Leggono le consegne? (% che non rilegge = ICC_A1 opzione 3)
  const noLegge=pct(R,'ICC_A1',3);
  const legCol=noLegge>40?'var(--co)':noLegge>20?'var(--am)':'var(--g)';

  let hh='<div class="heroes">';
  hh+='<div class="hero-card" style="border-color:'+rankCol+'"><div class="n" style="color:'+rankCol+'">'+rankPos+'\u00ba</div><div class="l">posizione della scuola<br>nella classifica delle priorit\u00e0</div></div>';

      h+='<div style="padding:10px 14px;margin-bottom:6px;background:var(--bg);border-radius:8px;border-left:3px solid var(--tl);font-size:12px;line-height:1.6;font-style:italic;color:var(--tx)">\u201c'+t+'\u201d</div>';
    });
    h+='</div>';
  }

  document.getElementById('content').innerHTML=h;

  // === CHART.JS: RADAR ===
  const profD=[];SDIM.forEach((l,si)=>{const sec='S'+(si+1),n=SNUMS[si];let s=0,c=0;for(let i=1;i<=n;i++){const a=avg(R,sec+'_'+i);if(a){s+=a;c++;}}profD.push(c?+(s/c).toFixed(2):0);});
  new Chart(document.getElementById('chRadar'),{type:'radar',data:{labels:SDIM,datasets:[{label:'Media',data:profD,backgroundColor:'rgba(27,109,63,.12)',borderColor:'#1B6D3F',pointBackgroundColor:SCOL,pointRadius:5,borderWidth:2}]},options:{scales:{r:{min:0,max:3,ticks:{stepSize:1,font:{size:9}},pointLabels:{font:{size:10,weight:500}}}},plugins:{legend:{display:false}}}});

}

function hmCol(v){
  if(v>=2.5)return '#1B6D3F';if(v>=2)return '#5C9E4A';if(v>=1.5)return '#C28B0A';return '#B8432E';
}
function hmColRev(v){// For difficulty: high=hard=red
  if(v>=2.5)return '#B8432E';if(v>=2)return '#C28B0A';if(v>=1.5)return '#5C9E4A';return '#1B6D3F';
}

function genDossier(){
  if(!ALL.length){alert('Nessun dato caricato.');return;}
  const groups=[{label:'Tutte le classi',data:ALL},{label:'Tutte le prime',data:ALL.filter(r=>r.classe&&r.classe.startsWith('1'))},{label:'Tutte le seconde',data:ALL.filter(r=>r.classe&&r.classe.startsWith('2'))},{label:'Tutte le terze',data:ALL.filter(r=>r.classe&&r.classe.startsWith('3'))},{label:'1A',data:ALL.filter(r=>r.classe==='1A')},{label:'1B',data:ALL.filter(r=>r.classe==='1B')},{label:'1C',data:ALL.filter(r=>r.classe==='1C')},{label:'2A',data:ALL.filter(r=>r.classe==='2A')},{label:'2B',data:ALL.filter(r=>r.classe==='2B')},{label:'2C',data:ALL.filter(r=>r.classe==='2C')},{label:'3A',data:ALL.filter(r=>r.classe==='3A')},{label:'3B',data:ALL.filter(r=>r.classe==='3B')},{label:'3C',data:ALL.filter(r=>r.classe==='3C')}];
  const w=window.open('','_blank');
  let doc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dossier TI ASCOLTO!</title>
<style>
@page{size:A4;margin:18mm 15mm}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',Helvetica,sans-serif;font-size:11px;color:#2C2C2C;line-height:1.5}
.cover{page-break-after:always;display:flex;flex-direction:column;align-items:center;justify-content:center;height:90vh;text-align:center}
.cover h1{font-size:32px;color:#1B6D3F;margin-bottom:6px}.cover .sub{font-size:14px;color:#7A7A72;margin-bottom:30px}
.cover .info{font-size:11px;color:#7A7A72}
.section{page-break-before:always}
h2{font-size:16px;color:#1B6D3F;border-bottom:2px solid #1B6D3F;padding-bottom:4px;margin:18px 0 10px}
h3{font-size:13px;color:#2E7CAF;margin:14px 0 6px}
.q{font-weight:600;margin:8px 0 3px;font-size:11px}
.opts{margin-left:8px;margin-bottom:4px}
.opt{display:flex;align-items:center;gap:6px;margin:2px 0}
.bar{height:10px;border-radius:3px;min-width:2px;display:inline-block}
.pct{font-weight:600;width:32px;text-align:right;font-size:10px}
.ev{padding:6px 10px;border-radius:4px;margin:6px 0;font-size:10px;line-height:1.5}
.ev-w{background:#FEF3D6;border-left:3px solid #C28B0A}.ev-a{background:#FDECE8;border-left:3px solid #B8432E}
.ev-g{background:#E8F5EE;border-left:3px solid #1B6D3F}.ev-i{background:#E8F2FA;border-left:3px solid #2E7CAF}
.rank-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #E8E8E2}
.rank-n{width:20px;height:20px;border-radius:50%;background:#7A7A72;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.rank-n.hl{background:#1B6D3F}
.quote{padding:6px 10px;margin:3px 0;background:#F5F5F0;border-left:3px solid #1A7F6D;font-style:italic;font-size:10px}
table.hm{border-collapse:collapse;width:100%;margin:6px 0}table.hm td,table.hm th{padding:3px 4px;text-align:center;font-size:8px;border:1px solid #E8E8E2}table.hm th{background:#F5F5F0;font-weight:600}
.footer{text-align:center;font-size:8px;color:#7A7A72;margin-top:20px;padding-top:6px;border-top:1px solid #E8E8E2}
.ap{display:flex;gap:4px;margin:2px 0;font-size:10px}.ap-n{width:90px;text-align:right}.ap-r{color:#B8432E;width:30px;text-align:right}.ap-g{color:#1B6D3F;width:30px}
</style></head><body>`;

  doc+=`<div class="cover"><h1>TI ASCOLTO!</h1><div class="sub">Profilo studente 2026 \u2014 Dossier analitico</div>
<div class="info">Scuola Sacra Famiglia \u2014 Orzinuovi<br>Progetto Andrea Cerioli<br><br>
${ALL.length} studenti | Generato il ${new Date().toLocaleDateString('it-IT')}<br><br>
Questo dossier contiene i risultati del questionario di profilazione<br>
somministrato agli studenti della scuola secondaria di I grado.<br><br>
I dati sono organizzati in sezione sommativa (tutte le classi)<br>
seguita dal dettaglio per ciascuna classe.</div></div>`;

  groups.forEach((grp,gi)=>{
    const R=grp.data,N=R.length;
    if(!N)return;
    doc+=`<div class="section"><h2>${grp.label} \u2014 ${N} studenti</h2>`;

    function pl(key,question,opts){
      const d=dist(R,key);const cols=['#1B6D3F','#C28B0A','#B8432E'];
      let s='<div class="q">'+question+'</div><div class="opts">';
      opts.forEach((o,i)=>{s+='<div class="opt"><div class="bar" style="width:'+Math.max(d[i]*1.5,2)+'px;background:'+cols[i]+'"></div><span style="color:'+cols[i]+'">'+o+'</span><span class="pct">'+d[i]+'%</span></div>';});
      return s+'</div>';
    }

    // Ranking
    const RK_L=['Andare bene a scuola','Amicizie','Sport','Famiglia','Passione/hobby','Stare bene con me','Costruire il futuro','Social e chat','Videogiochi e streaming','Essere accettato/a'];
    const rkA=RK_L.map((_,i)=>{let s=0,c=0;R.forEach(r=>{const v=+r['R_'+(i+1)];if(v){s+=v;c++;}});return{l:RK_L[i],a:c?s/c:99,i:i};}).sort((a,b)=>a.a-b.a);
    doc+='<h3>Classifica delle priorit\u00e0</h3>';
    rkA.forEach((it,p)=>{doc+='<div class="rank-row"><div class="rank-n'+(it.i===0?' hl':'')+'">'+(p+1)+'</div><span'+(it.i===0?' style="font-weight:700;color:#1B6D3F"':'')+'>'+it.l+'</span><span style="margin-left:auto;font-size:9px;color:#7A7A72">'+it.a.toFixed(1)+'\u00ba</span></div>';});
    const sPos=rkA.findIndex(x=>x.i===0)+1;
    if(sPos>=4)doc+='<div class="ev ev-w"><strong>La scuola \u00e8 al '+sPos+'\u00ba posto</strong> su 10 priorit\u00e0.</div>';
    const socialPos=rkA.findIndex(x=>x.i===7)+1;const gamePos=rkA.findIndex(x=>x.i===8)+1;
    if(socialPos<sPos||gamePos<sPos)doc+='<div class="ev ev-a">Social e/o videogiochi si posizionano davanti alla scuola nella classifica delle priorit\u00e0.</div>';

    // Aspettative
    doc+='<h3>Cosa si aspettano dalla scuola</h3>';
    doc+=pl('S6_1','Il ritmo delle lezioni',['Le lezioni uguali non lo disturbano','Vorrebbe pi\u00f9 variet\u00e0','Se non cambia ritmo, si spegne']);
    doc+=pl('S6_2','Il coinvolgimento emotivo',['Impara bene anche senza','Aiuta ma non \u00e8 tutto','Se non coinvolge, non arriva nulla']);
    doc+=pl('S6_3','Spazio per la creativit\u00e0',['Il programma va bene','Vorrebbe pi\u00f9 creativit\u00e0','Ha bisogno di creare']);
    doc+=pl('S6_4','Collegamento col mondo reale',['Non gli serve','A volte vorrebbe capire','Se non collegato, non ha senso']);
    doc+=pl('S6_5','L\'insegnante severo ma giusto',['Preferisce meno esigenza','Dipende','Chi pretende tira fuori il meglio']);
    doc+=pl('S6_7','I compiti ripetitivi',['Lo aiutano','Alcuni s\u00ec altri no','Sono una perdita di tempo']);
    doc+=pl('S6_8','Scegliere come lavorare',['Preferisce istruzioni','Guida + scelta','Decide lui il suo approccio']);

    // Studio
    doc+='<h3>Come studiano e cosa resta</h3>';
    doc+=pl('S4_1','Video o testo scritto',['Preferisce testo','Dipende','Video molto di pi\u00f9']);
    doc+=pl('S4_2','Schema o spiegazione orale',['Preferisce orale','Entrambi','Senza schema non arriva']);
    doc+=pl('S4_7','Preparazione verifica',['Capire, non a memoria','Un po\' e un po\'','Ripete finch\u00e9 entra']);
    doc+=pl('S4_9','Cosa resta dopo giorni',['Resta a lungo','Qualcosa s\u00ec','Dimenticato quasi tutto']);
    doc+=pl('S4_10','Ricordare e passione',['Ricorda tutto','Meglio le cose che piacciono','Solo se appassiona']);
    doc+=pl('S4_11','Perch\u00e9 studia',['Per capire davvero','Un po\' e un po\'','Solo per la verifica']);
    doc+=pl('S4_12','Quando non capisce',['Cerca altro modo','A volte rilegge a volte alternative','Rilegge sperando']);
    const mP=pct(R,'S4_9',3),vP=pct(R,'S4_11',3);
    if(mP>30||vP>30)doc+='<div class="ev ev-a"><strong>'+mP+'%</strong> dimentica tutto, <strong>'+vP+'%</strong> studia solo per il voto.</div>';

    // ICC
    doc+='<h3>La consegna</h3>';
    doc+=pl('ICC_A1','Rileggere la consegna',['Rilegge con attenzione','Legge veloce','Non rilegge']);
    doc+=pl('ICC_A2','Prima di iniziare',['Tempo per capire','Occhiata rapida','Parte subito']);
    doc+=pl('ICC_B1','Esempio nella consegna',['La scritta basta','A volte aiuta','Senza esempio non parte']);
    doc+=pl('ICC_B2','Spiegazione a voce',['Capisce leggendo','Aiuta un po\'','Senza voce non capisce']);
    doc+=pl('ICC_B3','Capire vs fare',['Fa quello che chiedono','Ogni tanto sbaglia','Fa spesso cosa diversa']);

    // Heatmap — solo 12 materie generiche
    const HMW=[['No','Un po\'','Molto'],['No','A volte','S\u00ec'],['Passivo','Dipende','Attivo']];
    doc+='<h3>Materie generiche: mappa termica</h3><table class="hm"><tr><th></th>';
    MDIM.forEach(d=>{doc+='<th>'+d+'</th>';});doc+='</tr>';
    SUBS.forEach((sn,si)=>{
      if(isSpecial(si))return;
      doc+='<tr><td style="text-align:left;font-weight:500">'+sn+'</td>';
      MDIM.forEach((dn,di)=>{
        const k='M_'+SUB_C[si]+'_'+['ARG','SPG','ATV'][di];
        const a=avg(R,k);const c=hmCol(a);
        const wi=a<1.5?0:a<2.5?1:2;
        doc+='<td style="background:'+c+';color:#fff">'+HMW[di][wi]+'</td>';
      });doc+='</tr>';
    });doc+='</table>';

    // === SEZIONI SPECIALI: ITALIANO / MATEMATICA / COMPORTAMENTO ===
    ['ITAL','MATE','COMP'].forEach(subjCode=>{
      const dims=SUBJ_DIMS_MAP[subjCode];
      const names=COMP_NAMES[subjCode];
      const opts=COMP_OPTS[subjCode];
      const titolo=({ITAL:'Italiano — 4 componenti',MATE:'Matematica — 4 componenti',COMP:'Comportamento — 7 componenti'})[subjCode];
      doc+='<h3>'+titolo+'</h3>';
      dims.forEach(dc=>{
        const k='M_'+subjCode+'_'+dc;
        const d=dist(R,k);
        doc+='<div class="ap"><div class="ap-n">'+names[dc]+'</div>';
        doc+='<div class="ap-r">'+d[0]+'% '+opts[dc][0]+'</div>';
        doc+='<span style="color:#7A7A72"> | </span>';
        doc+='<div style="color:#C28B0A">'+d[1]+'% '+opts[dc][1]+'</div>';
        doc+='<span style="color:#7A7A72"> | </span>';
        doc+='<div class="ap-g">'+d[2]+'% '+opts[dc][2]+'</div></div>';
      });
    });

    // Attivi/Passivi — solo materie generiche
    doc+='<h3>Attivi vs Passivi per materia (solo materie generiche)</h3>';
    SUBS.forEach((sn,si)=>{if(isSpecial(si))return;const k='M_'+SUB_C[si]+'_ATV';doc+='<div class="ap"><div class="ap-n">'+sn+'</div><div class="ap-r">'+pct(R,k,1)+'% passivi</div><span style="color:#7A7A72"> | </span><div class="ap-g">'+pct(R,k,3)+'% attivi</div></div>';});

    // Regole
    doc+='<h3>Come vivono le regole</h3>';
    doc+=pl('S9_1','Le regole della scuola',['Non hanno senso','Alcune s\u00ec','Giuste e servono']);
    doc+=pl('S9_3','Quando riceve una nota',['Non cambia nulla','Dipende','Capisce cosa migliorare']);
    doc+=pl('S9_7','Rispetto e comportamento',['Non dipende','Il rispetto aiuta','Se rispettato, do il massimo']);
    doc+=pl('S9_9','Dialogo o punizione',['Punizioni servono','Dipende','Parlarne \u00e8 meglio']);
    if(pct(R,'S9_7',3)>50)doc+='<div class="ev ev-i"><strong>'+pct(R,'S9_7',3)+'%</strong> dice: se trattato con rispetto, do il massimo.</div>';

    // Cittadinanza digitale
    doc+='<h3>Cittadinanza digitale</h3>';
    doc+=pl('S10_1','Riconoscere i rischi',['Non insegnato','Qualcosa','So riconoscerli']);
    doc+=pl('S10_4','Cambiato comportamento',['Come prima','Qualcosa','Molto cambiato']);
    doc+=pl('S10_5','Simulazioni vs spiegazioni',['Tradizionali','Entrambi','Simulazioni molto di pi\u00f9']);
    doc+=pl('S10_9','Coinvolgimento',['Non particolarmente','Abbastanza','Tra le pi\u00f9 coinvolgenti']);
    if(pct(R,'S10_5',3)>40)doc+='<div class="ev ev-g"><strong>'+pct(R,'S10_5',3)+'%</strong> dice che le simulazioni insegnano pi\u00f9 delle spiegazioni tradizionali.</div>';

    // Concentrazione
    doc+='<h3>Concentrazione e disturbo</h3>';
    doc+=pl('S3_1','Seguire senza distrarsi',['Concentrato','Si distrae ma recupera','Si distrae continuamente']);
    doc+=pl('S3_2','Quando i compagni disturbano',['Si concentra lo stesso','Fastidio ma regge','Non capisce pi\u00f9 nulla']);
    doc+=pl('S3_7','Il disturbo in classe',['Abbastanza ordine','A volte problema','Problema serio']);
    if(pct(R,'S3_7',3)>40)doc+='<div class="ev ev-a"><strong>'+pct(R,'S3_7',3)+'%</strong> considera il disturbo un problema serio.</div>';

    // La materia che manca
    const matN=R.map(r=>(r.MATERIA_NUOVA||'').trim()).filter(t=>t.length>1);
    if(matN.length){
      const freq={};matN.forEach(m=>{const k=m.toLowerCase().replace(/[^a-z\u00e0-\u00ff ]/g,'').trim();if(k)freq[k]=(freq[k]||0)+1;});
      const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
      doc+='<h3>La materia che manca ('+matN.length+' proposte)</h3>';
      sorted.forEach(([nome,count])=>{doc+='<div style="margin:2px 0;font-size:10px"><strong style="text-transform:capitalize">'+nome+'</strong> \u2014 '+count+'x</div>';});
    }

    // Testi liberi solo nel sommativo
    if(gi===0){
      const testi=R.map(r=>(r.TESTO||'').trim()).filter(t=>t.length>3);
      if(testi.length){
        doc+='<h3>Le loro parole ('+testi.length+' testi)</h3>';
        testi.forEach(t=>{doc+='<div class="quote">\u201c'+t+'\u201d</div>';});
      }
    }

    doc+='<div class="footer">\u00a9 2026 Progetto Andrea Cerioli \u2014 Scuola Sacra Famiglia Orzinuovi \u2014 Tutti i diritti riservati</div></div>';
  });

  doc+='</body></html>';
  w.document.write(doc);w.document.close();
  setTimeout(()=>w.print(),600);
}
</script></body></html>
