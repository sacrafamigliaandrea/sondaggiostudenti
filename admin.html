<!DOCTYPE html><html lang="it"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<title>TI ASCOLTO! — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--g:#1B6D3F;--gl:#E8F5EE;--gd:#145230;--tl:#1A7F6D;--am:#C28B0A;--co:#B8432E;--pu:#6B4FA0;--sk:#2E7CAF;--bg:#F5F5F0;--cd:#FFF;--tx:#2C2C2C;--mu:#7A7A72;--bd:#E8E8E2;--f:'DM Sans',sans-serif;--r:12px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--f);background:var(--bg);color:var(--tx);overflow-x:hidden}
.top{background:var(--g);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.top h1{font-size:18px;font-weight:700}.top select{padding:6px 10px;border-radius:8px;border:none;font-family:var(--f);font-size:12px}

/* HERO EVIDENCE CARDS */
.heroes{display:flex;gap:14px;padding:20px 24px;max-width:1400px;margin:0 auto}
.hero-card{flex:1;background:var(--cd);border-radius:var(--r);padding:20px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.05);border-left:4px solid}
.hero-card .n{font-size:36px;font-weight:700;line-height:1}.hero-card .l{font-size:11px;color:var(--mu);margin-top:4px;line-height:1.4}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:0 24px 40px;max-width:1400px;margin:0 auto}
.card{background:var(--cd);border-radius:var(--r);padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.05);border:1px solid var(--bd)}
.card.full{grid-column:1/-1}
.card h2{font-size:14px;font-weight:700;color:var(--g);margin-bottom:2px}
.card .sub{font-size:10px;color:var(--mu);margin-bottom:14px}
.ev{padding:10px 14px;border-radius:8px;margin-top:12px;font-size:11px;line-height:1.6}
.ev-warn{background:#FEF3D6;color:#7a5a0a;border-left:4px solid var(--am)}
.ev-alert{background:#FDECE8;color:#7a2a1a;border-left:4px solid var(--co)}
.ev-good{background:var(--gl);color:var(--gd);border-left:4px solid var(--g)}
.ev-info{background:#E8F2FA;color:#1a5a8a;border-left:4px solid var(--sk)}
canvas{max-height:300px!important}

/* HEATMAP */
.hm{display:grid;gap:2px;margin-top:8px}.hm-row{display:flex;gap:2px;align-items:center}
.hm-label{width:80px;font-size:9px;font-weight:500;text-align:right;padding-right:6px;flex-shrink:0}
.hm-cell{flex:1;height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;min-width:0}
.hm-header{display:flex;gap:2px;padding-left:82px;margin-bottom:2px}.hm-htxt{flex:1;font-size:8px;color:var(--mu);text-align:center}

/* DIVERGENT BARS */
.div-row{display:flex;align-items:center;gap:4px;margin-bottom:4px;font-size:10px}
.div-label{width:100px;text-align:right;flex-shrink:0;font-weight:500}
.div-bar{flex:1;height:22px;background:var(--bd);border-radius:4px;position:relative;overflow:hidden}
.div-left{position:absolute;right:50%;height:100%;border-radius:4px 0 0 4px}
.div-right{position:absolute;left:50%;height:100%;border-radius:0 4px 4px 0}
.div-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:var(--mu);opacity:.3}
.div-val{width:28px;font-size:9px;font-weight:600;text-align:center}

/* GAUGES */
.gauges{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.gauge{width:100px;text-align:center}
.gauge svg{width:90px;height:50px}
.gauge .gl{font-size:9px;color:var(--mu);margin-top:2px}

/* LOLLIPOP */
.lol-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.lol-label{width:140px;font-size:10px;text-align:right;flex-shrink:0}
.lol-track{flex:1;height:2px;background:var(--bd);position:relative;border-radius:1px}
.lol-dot{width:14px;height:14px;border-radius:50%;position:absolute;top:-6px;transition:left .3s}
.lol-line{position:absolute;left:0;top:0;height:2px;border-radius:1px}
.lol-thresh{position:absolute;top:-10px;width:1px;height:22px;background:var(--mu);opacity:.3}
.lol-val{width:30px;font-size:10px;font-weight:600}

/* LABELED DISTRIBUTION */
.ld{margin-bottom:16px;padding:12px 14px;background:var(--bg);border-radius:8px}
.ld-q{font-size:11px;font-weight:600;margin-bottom:6px;color:var(--tx)}
.ld-row{display:grid;grid-template-columns:220px 1fr 54px;align-items:center;gap:12px;margin-bottom:7px}
.ld-track{height:12px;background:#eee;border-radius:6px;overflow:hidden;position:relative}
.ld-fill{height:100%;border-radius:6px;transition:width .4s ease-out;min-width:2px}
.ld-label{font-size:11px;line-height:1.35;text-align:right;font-weight:500}
.ld-pct{font-size:12px;font-weight:700;text-align:left;font-variant-numeric:tabular-nums}

.load{text-align:center;padding:60px;font-size:14px;color:var(--mu)}
</style></head><body>

<div id="gate" style="height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
<div style="background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:360px;width:100%">
<h1 style="font-size:24px;color:var(--g);margin-bottom:4px">TI ASCOLTO!</h1>
<p style="font-size:12px;color:var(--mu);margin-bottom:20px">Area riservata — Dashboard docenti</p>
<input type="password" id="pwd" onkeydown="if(event.key==='Enter')tryPwd()" placeholder="Password" style="width:100%;padding:12px;border:2px solid var(--bd);border-radius:10px;font-family:var(--f);font-size:16px;text-align:center;margin-bottom:10px">
<button id="btnLogin" onclick="tryPwd()" style="width:100%;padding:12px;background:var(--g);color:#fff;border:none;border-radius:10px;font-family:var(--f);font-size:15px;font-weight:600;cursor:pointer">Accedi</button>
<p id="pwdErr" style="font-size:11px;color:var(--co);margin-top:8px;display:none">Password errata</p>
</div></div>

<div id="dash" style="display:none">
<div class="top"><h1>TI ASCOLTO! — Dashboard docenti</h1>
<div style="display:flex;gap:8px;align-items:center">
<span id="statusBadge" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600"></span><div id="complBox" style="padding:5px 12px;background:#fff;border:2px solid var(--g);border-radius:8px;display:flex;flex-direction:column;align-items:center;line-height:1.1"><span style="font-size:8px;font-weight:700;color:var(--g);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px">Compilazioni</span><span id="complValue" style="font-size:15px;font-weight:700;color:#2C2C2C;font-family:Menlo,Monaco,monospace">—/207</span><span id="complGender" style="font-size:9px;color:var(--mu);margin-top:2px;font-family:Menlo,Monaco,monospace">—</span></div><button onclick="refreshAll()" id="btnRefresh" title="Ricarica i dati dal foglio" style="padding:6px 14px;border-radius:8px;border:1px solid var(--g);background:#fff;color:var(--g);cursor:pointer;font-family:var(--f);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px"><span id="refreshIcon" style="display:inline-block;transition:transform .3s">↻</span> Aggiorna</button><div id="sessionCodeBox" style="display:none;padding:7px 14px;background:#fff;border:2px solid var(--am);border-radius:8px;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(194,139,10,.25)"><div style="display:flex;flex-direction:column;align-items:flex-start;line-height:1"><span style="font-size:9px;font-weight:700;color:var(--am);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px">Codice sessione</span><span id="sessionCodeValue" style="font-size:22px;font-weight:700;color:#2C2C2C;letter-spacing:5px;font-family:Menlo,Monaco,monospace">—</span></div><button onclick="copySessionCode()" id="btnCopyCode" style="padding:5px 12px;border-radius:6px;border:none;background:var(--am);color:#fff;cursor:pointer;font-size:11px;font-weight:700;font-family:var(--f);letter-spacing:.5px">Copia</button></div>
<select id="filtro"><option value="all">Tutte le classi</option><optgroup label="Per anno"><option value="y1">Tutte le prime</option><option value="y2">Tutte le seconde</option><option value="y3">Tutte le terze</option></optgroup><optgroup label="Per sezione"><option value="1A">1A</option><option value="1B">1B</option><option value="1C">1C</option><option value="2A">2A</option><option value="2B">2B</option><option value="2C">2C</option><option value="3A">3A</option><option value="3B">3B</option><option value="3C">3C</option></optgroup></select>
<button onclick="toggleSurvey()" id="btnToggle" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--am);cursor:pointer">Chiudi sondaggio</button>
<button onclick="genDossier()" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--g);cursor:pointer">Genera Dossier</button>
<a href="./TI_ASCOLTO_Progetto.pdf" target="_blank" rel="noopener" title="Apri il documento di progetto (PDF)" style="padding:6px 14px;border-radius:8px;border:1px solid var(--gd);font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--gd);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px">Documento Progetto</a>
<button onclick="clearData()" style="padding:6px 14px;border-radius:8px;border:none;font-family:var(--f);font-size:12px;font-weight:600;background:#fff;color:var(--co);cursor:pointer">Cancella dati</button>
</div></div>
<div id="heroArea"></div>
<div class="grid" id="content"></div>
</div>

<script>
// Password NON più hardcoded. Viene validata server-side e memorizzata solo in sessione.
let __pwd = '';
let __attempts = 0;
const MAX_ATTEMPTS = 5;
let __lockUntil = 0;
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzPyEMTOH8_1_LvlCrOq1Ecwyn4A4-T_BPgcXN7KgCM8IQS7avIbpj2imStBzF_21t5NQ/exec';
let surveyOpen=true;

async function tryPwd(){
  const err=document.getElementById('pwdErr');
  const now=Date.now();
  if(now<__lockUntil){
    const secs=Math.ceil((__lockUntil-now)/1000);
    err.textContent='Troppi tentativi. Riprova fra '+secs+' secondi.';
    err.style.display='block';
    return;
  }
  const pwd=document.getElementById('pwd').value;
  if(!pwd){err.textContent='Inserisci la password';err.style.display='block';return;}
  const btn=document.getElementById('btnLogin');
  const origText=btn?btn.textContent:'';
  if(btn){btn.disabled=true;btn.textContent='Verifica...';}
  try{
    const r=await fetch(SCRIPT_URL+'?action=verify&pwd='+encodeURIComponent(pwd));
    const d=await r.json();
    if(d.ok){
      __pwd=pwd;__attempts=0;
      document.getElementById('gate').style.display='none';
      document.getElementById('dash').style.display='block';
      checkStatus();loadData();
    }else{
      __attempts++;
      if(__attempts>=MAX_ATTEMPTS){
        __lockUntil=Date.now()+60000;
        err.textContent='Troppi tentativi. Bloccato per 60 secondi.';
      }else{
        err.textContent='Password errata ('+__attempts+'/'+MAX_ATTEMPTS+')';
      }
      err.style.display='block';
      document.getElementById('pwd').value='';
    }
  }catch(e){
    err.textContent='Errore di rete. Riprova.';
    err.style.display='block';
  }finally{
    if(btn){btn.disabled=false;btn.textContent=origText;}
  }
}

function checkStatus(){
  fetch(SCRIPT_URL+'?action=status').then(r=>r.json()).then(d=>{
    surveyOpen=d.status!=='closed';
    sessionCode=d.code||'';
    updateStatusUI();
  }).catch(()=>{});
}
let sessionCode = '';
function updateStatusUI(){
  const badge=document.getElementById('statusBadge');
  const btn=document.getElementById('btnToggle');
  const box=document.getElementById('sessionCodeBox');
  const val=document.getElementById('sessionCodeValue');
  if(surveyOpen){
    badge.textContent='APERTO';badge.style.background='var(--gl)';badge.style.color='var(--g)';
    btn.textContent='Chiudi sondaggio';btn.style.color='var(--am)';
    if(sessionCode){
      box.style.display='flex';
      val.textContent=sessionCode;
    } else {
      box.style.display='none';
    }
  } else {
    badge.textContent='CHIUSO';badge.style.background='var(--col)';badge.style.color='var(--co)';
    btn.textContent='Apri sondaggio';btn.style.color='var(--g)';
    box.style.display='none';
  }
}
function copySessionCode(){
  if(!sessionCode)return;
  navigator.clipboard.writeText(sessionCode).then(()=>{
    const btn=document.getElementById('btnCopyCode');
    const old=btn.textContent;btn.textContent='Copiato!';
    setTimeout(()=>{btn.textContent=old;},1200);
  }).catch(()=>{alert('Codice: '+sessionCode);});
}
function refreshAll(){
  const btn=document.getElementById('btnRefresh');
  const icon=document.getElementById('refreshIcon');
  if(btn){btn.disabled=true;btn.style.opacity='.6';}
  if(icon){icon.style.transform='rotate(360deg)';}
  checkStatus();
  loadData();
  // Feedback visivo: il bottone torna attivo dopo ~800ms
  setTimeout(()=>{
    if(btn){btn.disabled=false;btn.style.opacity='1';}
    if(icon){icon.style.transition='none';icon.style.transform='rotate(0deg)';setTimeout(()=>{icon.style.transition='transform .3s';},50);}
  },800);
}

function toggleSurvey(){
  const action=surveyOpen?'chiudere':'aprire';
  if(!confirm('Vuoi '+action+' il sondaggio?'))return;
  fetch(SCRIPT_URL+'?action=toggle&pwd='+encodeURIComponent(__pwd)).then(r=>r.json()).then(d=>{
    if(d.status){
      surveyOpen=d.status!=='closed';
      sessionCode=d.code||'';
      updateStatusUI();
      if(surveyOpen && sessionCode){
        // Apertura: mostro un dialogo prominente col codice
        alert('SONDAGGIO APERTO\n\nCodice sessione: '+sessionCode+'\n\nScrivi questo codice alla lavagna. Gli studenti dovranno inserirlo nel login.\nQuando chiudi il sondaggio il codice scade automaticamente.');
      } else {
        alert('Sondaggio chiuso. Il codice sessione è stato invalidato.');
      }
    }
    else alert('Errore: '+JSON.stringify(d));
  }).catch(e=>alert('Errore di rete.'));
}
function clearData(){
  if(!confirm('ATTENZIONE: stai per cancellare TUTTI i dati delle risposte. Questa operazione è irreversibile.\n\nSei sicuro?'))return;
  if(!confirm('Conferma definitiva: cancellare tutti i dati?'))return;
  fetch(SCRIPT_URL+'?action=clear&pwd='+encodeURIComponent(__pwd)).then(r=>r.json()).then(d=>{
    if(d.cleared){alert('Cancellati '+d.deletedRows+' record. Ricarico la pagina.');location.reload();}
    else alert('Errore: '+JSON.stringify(d));
  }).catch(e=>alert('Errore di rete.'));
}

// CSV pubblico rimosso per motivi di sicurezza. I dati vengono caricati via Apps Script con password validata server-side.
const SUBS=['Italiano','Inglese','Storia','Geografia','Matematica','Scienze','Tecnologia','Arte e Imm.','Musica','Spagnolo','Ed. Fisica','Religione','Ed. Civica','Comportam.','Informatica'];
const SUB_C=['ITAL','INGL','STOR','GEOG','MATE','SCIE','TECN','ARTE','MUSI','SPAN','EDFI','RELI','EDCI','COMP','INFO'];
const MDIM=['Interesse','Chiarezza','Attivazione'];
const SDIM=['Come imparo','Ritmo','Concentrazione','Capisco e studio','Socialità','Aspettative'];
const SCOL=['#2D8B57','#C28B0A','#B8432E','#6B4FA0','#1A7F6D','#2E7CAF'];
const SNUMS=[5,5,7,12,5,8];

// ============================================================
// SUBJ_DIMS_MAP — codici dimensione per materia
// Materie generiche: 6 dimensioni standard (ARG,REA,DIF,SPG,ATV,CON)
// Italiano/Matematica/Comportamento: componenti specifiche
// ============================================================
const SUBJ_DIMS_MAP={
  _default:['ARG','SPG','ATV'],
  ITAL:['ANT','EPL','GRA','SCR'],
  MATE:['ARI','GEO','REL','DAT'],
  COMP:['REG','LIN','SAN','RES','PAR','AUT','FRE']
};
const SUBJ_SPECIAL={ITAL:true,MATE:true,COMP:true};
// Nomi estesi componenti (per display)
const COMP_NAMES={
  ITAL:{ANT:'Antologia / Lettura',EPL:'Epica e Letteratura',GRA:'Grammatica',SCR:'Scrittura'},
  MATE:{ARI:'Aritmetica e Algebra',GEO:'Geometria',REL:'Relazioni e funzioni',DAT:'Dati e previsioni'},
  COMP:{REG:'Rispetto delle regole',LIN:'Uso del linguaggio',SAN:'Sanzioni ricevute',RES:'Responsabilità e assunzione del compito',PAR:'Partecipazione e lavoro di squadra',AUT:'Autocontrollo',FRE:'Frequenza'}
};
// Etichette opzioni testuali (per ldist) — 3 opzioni ciascuna
const COMP_OPTS={
  ITAL:{
    ANT:['Testi pesanti','Dipende dal testo','Alcune storie mi prendono'],
    EPL:['Troppo lontani da oggi','Qualcosa colpisce','Mi affascinano le origini'],
    GRA:['Regole confuse','Pesanti ma capibili','Interessante smontare la lingua'],
    SCR:['Tracce difficili/noiose','Se la traccia è chiara','Mi piace scrivere']
  },
  MATE:{
    ARI:['Calcoli pieni di trappole','Con metodo ed esercizio','Mi riescono bene'],
    GEO:['Figure e formule difficili','Se visualizzo la figura','Ragiono nello spazio'],
    REL:['Astratti, scollegati','Capisco ma fatico ad applicare','Vedo i collegamenti'],
    DAT:['Argomenti poco chiari','Li uso se servono','Mi incuriosiscono']
  },
  COMP:{
    REG:['Trasgredite più volte','Qualche sgarro','Rispettate e capite'],
    LIN:['Stesso tono con tutti','Adatto, non sempre','Cambio in base al contesto'],
    SAN:['Una o più note','Solo richiami verbali','Nessuna sanzione'],
    RES:['Rimando o solo se spinto','Meglio con guida','Autonomo'],
    PAR:['In disparte nei gruppi','Senza iniziative','Propongo e contribuisco'],
    AUT:['Rispondo d\'impulso','Trattengo a fatica','Respiro e penso'],
    FRE:['Più assenze del solito','Qualche ritardo','Sempre presente']
  }
};
// Helper: lista codici dimensione per una materia (per indice in SUB_C)
function dimsOf(subjIdx){
  const code=SUB_C[subjIdx];
  return SUBJ_DIMS_MAP[code]||SUBJ_DIMS_MAP._default;
}
// Helper: è una materia speciale?
function isSpecial(subjIdx){ return !!SUBJ_SPECIAL[SUB_C[subjIdx]]; }
// Helper: indice di una materia speciale
function idxOf(code){ return SUB_C.indexOf(code); }


let ALL=[];
function loadData(){
  fetch(SCRIPT_URL+'?action=fetchData&pwd='+encodeURIComponent(__pwd))
    .then(r=>r.json())
    .then(d=>{
      if(d.error){
        document.getElementById('content').innerHTML='<div class="load">Errore: '+d.error+'. Ricarica la pagina e rifai il login.</div>';
        return;
      }
      const rows=d.rows||[];
      // Aggiorno il contatore compilazioni nella topbar (anche a 0)
      const compl=document.getElementById('complValue');
      if(compl){compl.textContent=rows.length+'/207';}
      // Breakdown genere
      const complG=document.getElementById('complGender');
      if(complG){
        let cM=0,cF=0,cND=0;
        rows.forEach(r=>{const g=(r.genere||'').toUpperCase();if(g==='M')cM++;else if(g==='F')cF++;else cND++;});
        complG.textContent=rows.length?(cM+'M · '+cF+'F · '+cND+'ND'):'—';
      }
      if(rows.length===0){document.getElementById('content').innerHTML='<div class="load">Nessun dato.</div>';return;}
      ALL=rows;
      document.getElementById('filtro').onchange=()=>render();
      render();
    })
    .catch(()=>{
      document.getElementById('content').innerHTML='<div class="load">Errore di rete.</div>';
    });
}

function D(){const f=document.getElementById('filtro').value;if(f==='all')return ALL;if(f==='y1')return ALL.filter(r=>r.classe&&r.classe.startsWith('1'));if(f==='y2')return ALL.filter(r=>r.classe&&r.classe.startsWith('2'));if(f==='y3')return ALL.filter(r=>r.classe&&r.classe.startsWith('3'));return ALL.filter(r=>r.classe===f);}
function avg(R,k){let s=0,c=0;R.forEach(r=>{const v=+r[k];if(v){s+=v;c++;}});return c?s/c:0;}
function dist(R,k){let d=[0,0,0];R.forEach(r=>{const v=+r[k];if(v>=1&&v<=3)d[v-1]++;});const t=d[0]+d[1]+d[2];return t?d.map(x=>Math.round(x/t*100)):[0,0,0];}
function pct(R,k,v){let c=0,t=0;R.forEach(r=>{const x=+r[k];if(x){t++;if(x===v)c++;}});return t?Math.round(c/t*100):0;}
// === SISTEMA CONFRONTO M/F ===
// CMP_STATE memorizza per-sezione se il toggle è attivo.
// CURRENT_CMP viene settato dal renderer prima di generare una sezione,
// così tutti gli ldist al suo interno sanno in quale "ambito" stanno.
let CMP_STATE = {};
let CURRENT_CMP = null;

function cmpTgl(id){
  const on = CMP_STATE[id] ? 'on' : '';
  return '<button class="cmp-toggle ' + on + '" onclick="toggleCmp(\'' + id + '\');event.stopPropagation();" title="Attiva/disattiva confronto tra generi"><span class="cmp-dot"></span>M/F</button>';
}

function toggleCmp(id){
  CMP_STATE[id] = !CMP_STATE[id];
  render();
}

// Colori M/F — teal e ambra, neutri rispetto agli stereotipi
const CMP_M_COL = '#1A7F6D';
const CMP_F_COL = '#C28B0A';
const CMP_MIN = 5;  // soglia minima per sottogruppo

function ldistCompare(R,key,question,opts,colors){
  const Rm = R.filter(r => (r.genere||'').toUpperCase() === 'M');
  const Rf = R.filter(r => (r.genere||'').toUpperCase() === 'F');
  const tooFew = Rm.length < CMP_MIN || Rf.length < CMP_MIN;
  
  if (tooFew) {
    // Mostro aggregato + warning
    const d = dist(R, key);
    let h = '<div class="ld"><div class="ld-q">' + question + '</div>';
    opts.forEach((o,i) => {
      h += '<div class="ld-row">';
      h += '<div class="ld-label" style="color:' + colors[i] + '">' + o + '</div>';
      h += '<div class="ld-track"><div class="ld-fill" style="width:' + d[i] + '%;background:' + colors[i] + '"></div></div>';
      h += '<div class="ld-pct" style="color:' + colors[i] + '">' + d[i] + '%</div>';
      h += '</div>';
    });
    h += '<div class="cmp-warn">Confronto M/F non mostrato: sottogruppi troppo piccoli (M: ' + Rm.length + ', F: ' + Rf.length + '; soglia: ' + CMP_MIN + '). Vista aggregata sopra.</div>';
    h += '</div>';
    return h;
  }
  
  const dm = dist(Rm, key);
  const df = dist(Rf, key);
  let h = '<div class="ld"><div class="ld-q">' + question + ' <span style="font-size:9px;color:var(--mu);font-weight:500;letter-spacing:normal">· ' + Rm.length + 'M vs ' + Rf.length + 'F</span></div>';
  opts.forEach((o,i) => {
    h += '<div class="ld-row ld-cmp">';
    h += '<div class="ld-label" style="color:' + colors[i] + '">' + o + '</div>';
    h += '<div class="ld-cmp-stack">';
    h += '<div class="ld-cmp-sub"><span class="ld-cmp-tag" style="color:' + CMP_M_COL + '">M</span><div class="ld-track"><div class="ld-fill" style="width:' + dm[i] + '%;background:' + CMP_M_COL + '"></div></div><span class="ld-cmp-pct" style="color:' + CMP_M_COL + '">' + dm[i] + '%</span></div>';
    h += '<div class="ld-cmp-sub"><span class="ld-cmp-tag" style="color:' + CMP_F_COL + '">F</span><div class="ld-track"><div class="ld-fill" style="width:' + df[i] + '%;background:' + CMP_F_COL + '"></div></div><span class="ld-cmp-pct" style="color:' + CMP_F_COL + '">' + df[i] + '%</span></div>';
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

function ldist(R,key,question,opts,colors){
  colors = colors || ['var(--g)','var(--am)','var(--co)'];
  // Se siamo dentro una sezione con toggle M/F attivo, delega a ldistCompare
  if (CURRENT_CMP && CMP_STATE[CURRENT_CMP]) {
    return ldistCompare(R, key, question, opts, colors);
  }
  const d=dist(R,key);
  let h='<div class="ld"><div class="ld-q">'+question+'</div>';
  opts.forEach((o,i)=>{
    h+='<div class="ld-row">'
      +'<div class="ld-label" style="color:'+colors[i]+'">'+o+'</div>'
      +'<div class="ld-track"><div class="ld-fill" style="width:'+d[i]+'%;background:'+colors[i]+'"></div></div>'
      +'<div class="ld-pct" style="color:'+colors[i]+'">'+d[i]+'%</div>'
      +'</div>';
  });
  h+='</div>';return h;
}


// Rende una card per una materia speciale (ITAL/MATE/COMP): distribuzione % per componente
function renderSpecialSubj(R,subjCode,title,subtitle,cmpId){
  const dims=SUBJ_DIMS_MAP[subjCode]||[];
  const names=COMP_NAMES[subjCode]||{};
  const opts=COMP_OPTS[subjCode]||{};
  CURRENT_CMP = cmpId;
  let h='<div class="card"><h2>'+title+cmpTgl(cmpId)+'</h2><div class="sub">'+subtitle+'</div>';
  dims.forEach(dc=>{
    const key='M_'+subjCode+'_'+dc;
    const name=names[dc]||dc;
    const o=opts[dc]||['opz 1','opz 2','opz 3'];
    h+=ldist(R,key,name,o);
  });
  h+='</div>';
  CURRENT_CMP = null;
  return h;
}

  if(cambP>30)h+='<div class="ev ev-good" style="margin-top:6px"><strong>Impatto reale:</strong> il '+cambP+'% ha cambiato concretamente il proprio comportamento online dopo le attivit\u00e0. Non \u00e8 teoria: \u00e8 trasformazione.</div>';
  if(genP>30)h+='<div class="ev ev-info" style="margin-top:6px"><strong>Ponte scuola-famiglia:</strong> il '+genP+'% parla con i genitori di sicurezza online grazie a quello che ha imparato a scuola. Il percorso esce dall\'aula.</div>';
  if(coinP>40)h+='<div class="ev ev-info" style="margin-top:6px"><strong>Coinvolgimento:</strong> il '+coinP+'% considera la cittadinanza digitale tra le esperienze pi\u00f9 coinvolgenti della scuola.</div>';
  h+='</div>';

  // === 9. CONCENTRAZIONE ===
  CURRENT_CMP = 's3';
  h+='<div class="card"><h2>Concentrazione e disturbo'+cmpTgl('s3')+'</h2><div class="sub">Impatto dell\'ambiente classe sull\'apprendimento</div>';
  h+=ldist(R,'S3_1','Seguire una spiegazione senza distrarsi',['Resto concentrato fino alla fine','Mi distraggo ma recupero','Mi distraggo continuamente']);
  h+=ldist(R,'S3_2','Quando i compagni disturbano',['Riesco a concentrarmi lo stesso','Mi d\u00e0 fastidio ma ce la faccio','Non capisco pi\u00f9 nulla']);
  h+=ldist(R,'S3_4','Se qualcuno interrompe la spiegazione',['Riprendo subito il filo','Fatica ma ci riesco','Perdo completamente il filo']);
  h+=ldist(R,'S3_6','Il comportamento degli altri e il mio impegno',['Non mi condiziona','Ogni tanto s\u00ec','Se gli altri mollano, mollo anch\'io']);
  h+=ldist(R,'S3_7','Il disturbo in classe',['C\'\u00e8 abbastanza ordine','A volte \u00e8 un problema','Il disturbo \u00e8 un problema serio']);
  if(pct(R,'S3_7',3)>40)h+='<div class="ev ev-alert"><strong>Ambiente classe:</strong> il '+pct(R,'S3_7',3)+'% considera il disturbo un problema serio. Non \u00e8 disciplina: \u00e8 un ostacolo per chi vuole imparare.</div>';
  h+='</div>';

  // === 10. RANKING PRIORITÀ ===
  h+='<div class="card"><h2>Cosa conta per loro</h2><div class="sub">Classifica media delle priorit\u00e0 — posizione 1 = pi\u00f9 importante</div>';
  const RK_LABELS=['Andare bene a scuola','Amicizie','Sport','Famiglia','Passione/hobby','Stare bene con me','Costruire il futuro','Social e chat','Videogiochi e streaming','Essere accettato/a'];
  const rkAvgs=RK_LABELS.map((_,i)=>{let s=0,c=0;R.forEach(r=>{const v=+r['R_'+(i+1)];if(v){s+=v;c++;}});return{label:RK_LABELS[i],avg:c?s/c:99,idx:i};}).sort((a,b)=>a.avg-b.avg);
  rkAvgs.forEach((item,pos)=>{
    const isSchool=item.idx===0;const col=isSchool?'var(--g)':'var(--mu)';const bg=isSchool?'var(--gl)':'var(--bg)';
    h+='<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:4px;background:'+bg+';border-radius:8px'+(isSchool?';border:2px solid var(--g)':'')+'">';
    h+='<div style="width:28px;height:28px;border-radius:50%;background:'+col+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0">'+(pos+1)+'</div>';
    h+='<div style="font-size:13px;font-weight:'+(isSchool?'700':'400')+';color:'+(isSchool?'var(--g)':'var(--tx)')+'">'+item.label+'</div>';
    h+='<div style="margin-left:auto;font-size:11px;color:var(--mu)">media: '+item.avg.toFixed(1)+'\u00ba</div>';
    h+='</div>';
  });
  const schoolPos=rkAvgs.findIndex(x=>x.idx===0)+1;
  const socialPos=rkAvgs.findIndex(x=>x.idx===7)+1;const gamePos=rkAvgs.findIndex(x=>x.idx===8)+1;
  if(schoolPos>=4)h+='<div class="ev ev-warn"><strong>La scuola \u00e8 al '+schoolPos+'\u00ba posto</strong> su 10 priorit\u00e0. Non \u00e8 colpa degli studenti: \u00e8 il contesto in cui crescono. La sfida \u00e8 rendere la scuola pi\u00f9 rilevante nella loro vita.</div>';
  else if(schoolPos<=2)h+='<div class="ev ev-good"><strong>La scuola \u00e8 al '+schoolPos+'\u00ba posto:</strong> gli studenti la considerano importante. Un dato su cui costruire.</div>';
  if(socialPos<schoolPos||gamePos<schoolPos)h+='<div class="ev ev-alert" style="margin-top:6px"><strong>Il digitale batte la scuola:</strong> '+(socialPos<schoolPos?'Social e chat ('+socialPos+'\u00ba)':'')+(socialPos<schoolPos&&gamePos<schoolPos?' e ':'')+(gamePos<schoolPos?'Videogiochi ('+gamePos+'\u00ba)':'')+' si posizionano davanti alla scuola ('+schoolPos+'\u00ba). Il mondo digitale commerciale occupa pi\u00f9 spazio nella loro vita di quanto ne occupi l\'apprendimento.</div>';
  const acceptPos=rkAvgs.findIndex(x=>x.idx===9)+1;
  if(acceptPos<=3)h+='<div class="ev ev-info" style="margin-top:6px"><strong>Pressione sociale:</strong> \u201cEssere accettato/a dagli altri\u201d \u00e8 al '+acceptPos+'\u00ba posto. La paura del giudizio e dell\'esclusione pesa pi\u00f9 dello studio.</div>';
  h+='</div>';

  // === 11. LA MATERIA CHE MANCA ===
  const materie=R.map(r=>(r.MATERIA_NUOVA||'').trim()).filter(t=>t.length>1);
  if(materie.length){
    // Count frequencies
    const freq={};materie.forEach(m=>{const k=m.toLowerCase().replace(/[^a-z\u00e0-\u00ff ]/g,'').trim();if(k)freq[k]=(freq[k]||0)+1;});
    const sorted=Object.entries(freq).sort((a,b)=>b[1]-a[1]);
    h+='<div class="card"><h2>La materia che manca</h2><div class="sub">'+materie.length+' studenti su '+N+' hanno proposto una materia nuova</div>';
    sorted.forEach(([nome,count])=>{
      const pctM=Math.round(count/materie.length*100);
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="font-size:12px;font-weight:600;width:140px;text-align:right;text-transform:capitalize">'+nome+'</div>';
      h+='<div style="flex:1;height:18px;background:var(--bd);border-radius:4px;overflow:hidden"><div style="width:'+pctM+'%;height:100%;background:var(--pu);border-radius:4px"></div></div>';
      h+='<div style="font-size:11px;font-weight:600;color:var(--pu);width:50px">'+count+'x ('+pctM+'%)</div></div>';
    });
    if(sorted.length&&sorted[0][1]>=3)h+='<div class="ev ev-info"><strong>Richiesta ricorrente:</strong> \u201c'+sorted[0][0]+'\u201d \u00e8 la materia pi\u00f9 richiesta con '+sorted[0][1]+' proposte. Un segnale da non ignorare.</div>';
    h+='</div>';
  }

  // === 12. SPAZIO LIBERO — LE LORO PAROLE ===
  const testi=R.map(r=>(r.TESTO||'').trim()).filter(t=>t.length>3);
  if(testi.length){
    h+='<div class="card full"><h2>Le loro parole</h2><div class="sub">'+testi.length+' studenti su '+N+' hanno scritto qualcosa nello spazio libero</div>';
    testi.forEach(t=>{
      h+='<div style="padding:10px 14px;margin-bottom:6px;background:var(--bg);border-radius:8px;border-left:3px solid var(--tl);font-size:12px;line-height:1.6;font-style:italic;color:var(--tx)">\u201c'+t+'\u201d</div>';
    });
    h+='</div>';
  }

  document.getElementById('content').innerHTML=h;

  // === CHART.JS: RADAR — con zone colorate, valori nelle label, evidenze ===
  const profD=[];SDIM.forEach((l,si)=>{const sec='S'+(si+1),n=SNUMS[si];let s=0,c=0;for(let i=1;i<=n;i++){const a=avg(R,sec+'_'+i);if(a){s+=a;c++;}}profD.push(c?+(s/c).toFixed(2):0);});
  
  // Colore interpretativo in base al valore medio
  function profColor(v){
    if(v>=2.5) return '#1B6D3F';     // consolidata
    if(v>=2.0) return '#5C9E4A';     // buona
    if(v>=1.8) return '#C28B0A';     // attenzione
    return '#B8432E';                // critica
  }
  function profStatus(v){
    if(v>=2.5) return {tag:'consolidata',col:'#1B6D3F'};
    if(v>=2.0) return {tag:'buona',col:'#5C9E4A'};
    if(v>=1.8) return {tag:'attenzione',col:'#C28B0A'};
    return {tag:'critica',col:'#B8432E'};
  }
  
  // Labels che mostrano "Dimensione — 2.4"
  const labelsWithValues = SDIM.map((l,i)=>l+'  '+(profD[i]?profD[i].toFixed(1):'–'));
  
  // Plugin per disegnare le bande colorate di fondo
  const zonePlugin = {
    id: 'zoneBands',
    beforeDatasetsDraw(chart) {
      const {ctx, scales:{r}} = chart;
      if (!r) return;
      const cx = r.xCenter, cy = r.yCenter;
      ctx.save();
      // Banda verde pallida: raggio 2.5 → 3
      ctx.beginPath();
      ctx.fillStyle = 'rgba(27,109,63,0.08)';
      ctx.arc(cx, cy, r.getDistanceFromCenterForValue(3), 0, 2*Math.PI);
      ctx.arc(cx, cy, r.getDistanceFromCenterForValue(2.5), 0, 2*Math.PI, true);
      ctx.fill();
      // Banda rosa pallida: raggio 0 → 1.8
      ctx.beginPath();
      ctx.fillStyle = 'rgba(184,67,46,0.08)';
      ctx.arc(cx, cy, r.getDistanceFromCenterForValue(1.8), 0, 2*Math.PI);
      ctx.fill();
      ctx.restore();
    }
  };
  
  // Helper: calcolo profilo medio su un sottocampione
  function computeProfD(sub) {
    const out = [];
    SDIM.forEach((l,si)=>{
      const sec='S'+(si+1), n=SNUMS[si];
      let s=0, c=0;
      for (let i=1; i<=n; i++) { const a=avg(sub, sec+'_'+i); if(a){ s+=a; c++; } }
      out.push(c ? +(s/c).toFixed(2) : 0);
    });
    return out;
  }
  
  // Decido dataset in base al toggle radar
  const radarCmp = CMP_STATE['radar'] === true;
  const Rm = R.filter(r => (r.genere||'').toUpperCase() === 'M');
  const Rf = R.filter(r => (r.genere||'').toUpperCase() === 'F');
  const canCompare = radarCmp && Rm.length >= CMP_MIN && Rf.length >= CMP_MIN;
  
  let datasets, chartLabels, legendDisplay = false, tooltipCallback;
  
  if (canCompare) {
    const profDm = computeProfD(Rm);
    const profDf = computeProfD(Rf);
    // Le label non hanno più un solo valore: mostro entrambi
    chartLabels = SDIM.map((l,i) => l);
    datasets = [
      {
        label: 'M (' + Rm.length + ')',
        data: profDm,
        backgroundColor: 'rgba(26,127,109,.15)',
        borderColor: CMP_M_COL,
        pointBackgroundColor: CMP_M_COL,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 6,
        borderWidth: 2.5
      },
      {
        label: 'F (' + Rf.length + ')',
        data: profDf,
        backgroundColor: 'rgba(194,139,10,.15)',
        borderColor: CMP_F_COL,
        pointBackgroundColor: CMP_F_COL,
        pointBorderColor: '#fff',
        pointBorderWidth: 2,
        pointRadius: 6,
        borderWidth: 2.5
      }
    ];
    legendDisplay = true;
    tooltipCallback = function(ctx){ return ctx.dataset.label + ': ' + ctx.parsed.r.toFixed(2) + ' / 3'; };
  } else {
    chartLabels = labelsWithValues;
    datasets = [{
      label: 'Media',
      data: profD,
      backgroundColor: 'rgba(27,109,63,.18)',
      borderColor: '#1B6D3F',
      pointBackgroundColor: profD.map(v=>profColor(v)),
      pointBorderColor: '#fff',
      pointBorderWidth: 2,
      pointRadius: 7,
      pointHoverRadius: 9,
      borderWidth: 2.5
    }];
    tooltipCallback = function(ctx){ return 'Media: ' + ctx.parsed.r.toFixed(2) + ' / 3'; };
  }
  
  // Distruggo chart precedente se esiste (evita warning Chart.js a re-render)
  if (window._chRadarInst) { try { window._chRadarInst.destroy(); } catch(e){} }
  
  window._chRadarInst = new Chart(document.getElementById('chRadar'),{
    type:'radar',
    data:{
      labels: chartLabels,
      datasets: datasets
    },
    options:{
      responsive: true,
      maintainAspectRatio: true,
      aspectRatio: 1,
      scales:{
        r:{
          min:0, max:3,
          ticks:{ stepSize:1, font:{size:11}, color:'#7A7A72', backdropColor:'transparent' },
          pointLabels:{ font:{size:13, weight:'600'}, color:'#2C2C2C', padding:12 },
          grid:{ color:'#E0E0DC' },
          angleLines:{ color:'#E0E0DC' }
        }
      },
      plugins:{
        legend:{display: legendDisplay, position: 'bottom', labels:{font:{size:11,weight:'600'},padding:14,boxWidth:14}},
        tooltip:{ callbacks:{ label: tooltipCallback } }
      }
    },
    plugins: [zonePlugin]
  });
  
  // Se il toggle era on ma i sottogruppi sono troppo piccoli, avviso
  if (radarCmp && !canCompare) {
    const evBox0 = document.getElementById('radarEvidence');
    if (evBox0) {
      evBox0.insertAdjacentHTML('afterbegin', '<div class="cmp-warn" style="margin-bottom:10px">Confronto M/F non mostrato: sottogruppi troppo piccoli (M: ' + Rm.length + ', F: ' + Rf.length + '; soglia: ' + CMP_MIN + '). Vista aggregata.</div>');
    }
  }
  
  // === EVIDENZE PEDAGOGICHE AFFIANCO AL RADAR ===
  // Per ogni dimensione, pesco l'evidenza più saliente dalle risposte
  function topEvidence(sectionIdx, R) {
    const sec = 'S' + (sectionIdx+1);
    // Per ogni domanda della sezione, trovo la percentuale max di opzione "3" (polo forte)
    // e poi restituisco la frase più rilevante.
    // Logica semplificata: guardo % di opzione 3 (polo positivo/negativo a seconda dimensione)
    const evidenceMap = {
      0: {q:'S1_3',v:3,text:'prefers costruire a studiare teoria'},    // Come imparo
      1: {q:'S2_0',v:3,text:"si distrae dopo pochi minuti di spiegazione"}, // Ritmo
      2: {q:'S3_6',v:3,text:"il disturbo in classe è un problema serio"}, // Concentrazione
      3: {q:'S4_6',v:3,text:"studia ancora ripetendo a memoria"},     // Capisco e studio
      4: {q:'S5_0',v:3,text:"lavora meglio in gruppo"},               // Socialità
      5: {q:'S6_3',v:3,text:"vuole che quello che impara sia collegato alla realtà"} // Aspettative
    };
    const ev = evidenceMap[sectionIdx];
    if (!ev) return null;
    const p = pct(R, ev.q, ev.v);
    return {pct: p, text: ev.text};
  }
  
  let evH = '<div style="font-size:12px;line-height:1.45;color:var(--tx)">';
  evH += '<div style="font-weight:700;color:#1B6D3F;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;font-size:11px">Cosa leggere nel radar</div>';
  SDIM.forEach((dim,i)=>{
    const v = profD[i];
    const st = profStatus(v);
    const ev = topEvidence(i, R);
    evH += '<div style="padding:8px 10px;margin-bottom:6px;background:'+(i%2===0?'var(--bg)':'#fff')+';border-left:3px solid '+st.col+';border-radius:4px">';
    evH += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px">';
    evH += '<strong style="color:'+st.col+'">'+dim+'</strong>';
    evH += '<span style="font-size:11px;color:'+st.col+';font-weight:600">'+(v?v.toFixed(2):'—')+' · '+st.tag+'</span>';
    evH += '</div>';
    if (ev && ev.pct >= 20) {
      evH += '<div style="font-size:11px;color:var(--mu);line-height:1.4"><strong>'+ev.pct+'%</strong> '+ev.text+'</div>';
    } else {
      evH += '<div style="font-size:11px;color:var(--mu);font-style:italic">Dato stabile sulla sezione.</div>';
    }
    evH += '</div>';
  });
  evH += '</div>';
  const evBox = document.getElementById('radarEvidence');
  if (evBox) evBox.innerHTML = evH;

}

        ['S5',0,3,'il gruppo \u00e8 il tuo ambiente naturale','forza'],
        ['S5',0,1,'nella solitudine trovi la concentrazione','forza'],
        ['S5',4,3,'quando la collaborazione \u00e8 vera, impari il doppio','forza'],
        ['S6',4,3,'apprezzi chi ti sfida e pretende il massimo','forza'],
        ['S6',2,3,'hai bisogno di creare, di esprimerti','forza'],
        ['ICC_A',1,1,'leggi le consegne con attenzione prima di partire','forza'],
        ['ICC_A',1,3,'non ti fermi a leggere le consegne','crescita'],
        ['ICC_A',2,3,'parti troppo in fretta','crescita']
      ];
      // Nota: i codici ICC_A vs IA divergono fra index e foglio. Nell\'admin i campi
      // sono ICC_A1..A4 e ICC_B1..B4, mentre index usava IA. Uso ICC_A come approx.
      
      // Conteggi
      const countForza = {};
      const countCresc = {};
      const countScuola = {};
      
      daimonMap.forEach(([sec,qi,val,phrase,type])=>{
        // Per ICC_A la colonna nel foglio è ICC_A1 / ICC_A2 (senza underscore tra A e numero)
        // Per tutte le altre sezioni il formato è SEC_N (S1_0, S2_3, ecc.)
        const key = sec.startsWith('ICC_') ? sec + qi : sec + '_' + qi;
        let hits = 0;
        R.forEach(r=>{ if (+r[key] === val) hits++; });
        if (hits > 0) {
          const bag = type === 'forza' ? countForza : countCresc;
          bag[phrase] = (bag[phrase]||0) + hits;
        }
      });
      
      // Scuola che serve (stessa logica di P.scuola)
      const scuolaMap = [
        ['S6_0','variare il ritmo'],
        ['S6_1','coinvolgervi emotivamente'],
        ['S6_3','collegare ci\u00f2 che imparano al mondo reale'],
        ['S6_5','pretendere il massimo con rispetto'],
        ['S6_7','lasciarli scegliere come affrontare le cose'],
        ['S6_6','non dare compiti ripetitivi']
      ];
      scuolaMap.forEach(([k,phrase])=>{
        let hits = 0;
        R.forEach(r=>{ if (+r[k] === 3) hits++; });
        if (hits > 0) countScuola[phrase] = hits;
      });
      
      // Ordino e prendo top 10 per forza/crescita, tutte per scuola
      const topF = Object.entries(countForza).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const topC = Object.entries(countCresc).sort((a,b)=>b[1]-a[1]).slice(0,10);
      const topS = Object.entries(countScuola).sort((a,b)=>b[1]-a[1]);
      
      if (topF.length || topC.length || topS.length) {
        doc+='<h3>Lettura emergente \u2014 cosa raccontano i profili individuali</h3>';
        doc+='<div class="emerge-intro">Questa sezione aggrega ci\u00f2 che il sistema ha identificato come tratto saliente in ogni profilo individuale. Non sono semplici risposte: sono caratteristiche emerse dal sistema di lettura dimensionale che genera la voce interiore di ogni studente. Base: '+N+' profili.</div>';
        
        doc+='<div class="emerge-cols">';
        // Forze
        doc+='<div class="emerge-block">';
        doc+='<h4>Le forze pi\u00f9 ricorrenti</h4>';
        if(topF.length){
          topF.forEach(([phrase,count])=>{
            const p = Math.round((count/N)*100);
            doc+='<div class="emerge-item"><div class="emerge-pct">'+p+'%</div><div class="emerge-txt">'+phrase+'</div></div>';
          });
        } else {
          doc+='<div style="font-size:10px;color:#888;font-style:italic">Nessuna forza dominante rilevata.</div>';
        }
        doc+='</div>';
        
        // Aree di crescita
        doc+='<div class="emerge-block growth">';
        doc+='<h4>Le aree di crescita pi\u00f9 ricorrenti</h4>';
        if(topC.length){
          topC.forEach(([phrase,count])=>{
            const p = Math.round((count/N)*100);
            doc+='<div class="emerge-item"><div class="emerge-pct">'+p+'%</div><div class="emerge-txt">'+phrase+'</div></div>';
          });
        } else {
          doc+='<div style="font-size:10px;color:#888;font-style:italic">Nessuna area critica diffusa.</div>';
        }
        doc+='</div>';
        doc+='</div>';
        
        // Scuola che chiedono
        if(topS.length){
          doc+='<div class="emerge-scuola">';
          doc+='<h4>Cosa chiedono alla scuola</h4>';
          const maxS = topS[0][1];
          topS.forEach(([phrase,count])=>{
            const p = Math.round((count/N)*100);
            const fill = Math.round((count/maxS)*100);
            doc+='<div class="emerge-bar-row"><div style="text-align:right">'+phrase+'</div><div class="emerge-bar-trk"><div class="emerge-bar-fil" style="width:'+fill+'%"></div></div><div style="font-weight:700;font-family:Menlo,monospace;color:#2E7CAF">'+p+'%</div></div>';
          });
          doc+='</div>';
        }
      }
    }

    doc+='<div class="footer">\u00a9 2026 Progetto Andrea Cerioli \u2014 Scuola Sacra Famiglia Orzinuovi \u2014 Tutti i diritti riservati</div></div>';
  });

  doc+='</body></html>';
  w.document.write(doc);w.document.close();
  setTimeout(()=>w.print(),600);
}
</script></body></html>
